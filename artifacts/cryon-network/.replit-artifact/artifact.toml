kind = "web"
previewPath = "/"
title = "Cryon Network"
version = "1.0.0"
id = "artifacts/cryon-network"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20504

[services.development]
run = "pnpm --filter @workspace/cryon-network run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cryon-network", "run", "build" ]
publicDir = "artifacts/cryon-network/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20504"
BASE_PATH = "/"
